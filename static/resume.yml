      - label: "Planning"
        details: "Enterprise Level Data Systems Architecture using Databricks,Plotly, PowerBI and Python/R"
      - label: "Cloud Ready"
        details: "Cloud Scale Web Systems and API’s hosted on AWS, Google Cloud, and Azure"
      - label: "Languages/Frameworks"
        details: "Python/Spark, Javascript/Node.js, Bash, PHP, SQL, XML, Vue, React, Svelte"
      - label: "Technologies/Systems"
        details: "Linux, Docker, MySQL, Postgres, SQL Server, AWS, Azure, Google Cloud, Redis, CI/CD, CRM, ERP, REST, GraphQL"
    Work Experience:
      - company: "Vermont Agency of Education"
        position: "Education Data Administrator/Engineer"
        date:
        start_date: "2020-06"
        end_date: "present"
        location: "Montpelier, VT"
        summary: "Lead the agency's data technology initiatives. Led teams ranging from 4 to 25 members over many projects."
        highlights:
          - "**Automated countless tasks through python** and scheduled jobs, saving thousands of man hours per year."
          - "Made support documentation easy to use by creating a public facing knowledge base. Cut email questions and unique identification process time by 50% for the State Longitudinal Data System support group."
          - "**Created and administrated a Jupyter Hub** environment to manage the IDE and tooling across the division. The system was Integrated with Active Directory and used Kerberos tokens to authenticate."
          - "**Migrated Jupyter Hub system to Databricks** to comply with security and logging requirements. Migrated Cron based scripts to Databricks Jobs & Pipelines. Created a streaming pipeline to deal with 54 million rows of data that changed nightly."
          - "**Turned statute into code.** Calculated key elements of education data used to determine state education taxes. Ensured accuracy and quality by creating a data quality system and related dashboards."
          - "**Worked with 52 local education agencies across 4 different student information system providers** to ensure a smooth transition between data collection systems. Provide support to data quality issues from data managers."
          - "**Architected systems and services** using docker deployments, Kubernetes and Apache Airflow deployments for Ed-Fi and other tools. "
      - company: "Competitive Computing (C2)"
        position: "Software Engineer & Tech Lead"
        date:
        start_date: "2018-01"
        end_date: "2020-06"
        location: "Colchester, VT"
        summary: "Worked on various enterprise projects. Create website systems, CI/CD workflows and architecture decisions."
        highlights:
          - "Through the use of systems I helped create, 1,389 hours of manual work each year and over 40,000 touch points removed from data processing efforts. **One contract was extended 3 times** due to the client wanting more work fom me and my team."
          - "Converted legacy Oracle sql procedures to python, **my bill was payed back** in reduced licensing fees, let alone reducing technical debt and risk for my client."
          - "**Represented clients** technical interests in contract negotiations, training, and stack choices."
          - "**Mentored other staff** on the use of Python/Node.js and coding best practices."
      - company: "Clevertech.biz"
        position: "Senior Developer and Project Manager"
        date:
        start_date: "2014"
        end_date: "2018"
        location: "New York, New York"
        summary: "Created applications and websites for clients, advised architecture choices, and helped troubleshoot escalated issues. Created new project boilerplate based on NodeJS, Redis and Docker deploying to Kubernetes."
        highlights:
          - "Worked to create version 2.0 of the lookbooks application in use by Getty Image’s artists. I contributed major parts to the upgrade including adding **drag and drop asset management, an HTML5 based uploader**, a migration to a template based front end UI from existing jQuery."
          - "**Increased the page load speed** client side on several projects. Added external integrations to existing applications."
          - "Used a **Docker based infrastructure to deploy scalable API’s** and backend processors capable of sending millions of custom generated emails per day. Used event driven architecture to achieve scale and cost savings."
          - "Implemented a Docker/Jenkins/ESLint based project boilerplate that is now used on all new projects, deployed to Kubernetes via CI/CD. Provided oversight on DevOps operations and escalations."
          - "Provided technical leadership to various projects ranging from ordering AI driven taxis to using XBOX Kinect peripherals to do package size/volume estimates in near real time for sorting systems."
      - company: "for MBJ Consulting and Wheelstv.com"
        position: "Software Contractor"
        date:
        start_date: "2013"
        end_date: "2014"
        location: "Vergennes, VT"
        summary: "I went into business for myself and developed custom solutions for my customers."
        highlights:
          - "Created video SEO tool that would add pre/post rolls and overlays to a set of car promotion videos, then upload them to youtube/facebook/vimeo through a website/dashboard. Also created an encoding to output various formats."
          - "Provided Department of Labor form 5500 Data in a consolidated database that allows quick searching and comparison benchmarking."
          - "Designed and developed 401K portfolio research and creation tool for Verisight Inc. that generated PDF proposals for its customers. Also worked with DOL form 5500 data analysis and conversion to an REST API"
      - company: "Red Barn Media Group"
        position: "Senior Developer and Systems Architect"
        date:
        start_date: "2011"
        end_date: "2013"
        location: "Charlotte, VT"
        summary: "Lead a team of 3 developers and 1 designer creating apps and services for the HVAC manufacturer and installer industries"
        highlights:
          - "**Provided technical consultation and estimates**. Handled any technical escalations that others could not solve."
          - "Created Apache Cordova and jQuery Mobile based Mobile applications using Camera QR code capture."
          - "Integrated with external companies and services including: Brainshark, Twillio, SAML, Google Maps, Mailgun"
          - "Added browser based phone support into our systems with twillio, immediately converting incoming calls to support tickets and allowed support team tracking. Saved countless hours per week"
          - "Created real time analytics of system health and marketing targets. Implemented Invoicing System that all accounting now goes through."
          - "Made Custom Drupal Modules and deployment system to bridge gap between desired system functionality and Drupal Core."
      - company: "National Gardening Association"
        position: "IT Administrator & Developer"
        date:
        start_date: "2007"
        end_date: "2011"
        location: "S. Burlington, VT"
        summary: "garden.org, kidsgardening.org. In charge of all IT related tasks for the organization. Administered Internal Network, Mail Server, External Connections, and Internal VOIP network. Started and promoted Facebook page to 10,000 users within 3 months."
        highlights:
          - "Administered many Linux Servers of various flavors and vintage; serving over 5 million web pages per year for internal and external large, demanding clients: Home Depot, Scotts, Subaru, Yum, Growers Supply, FDA, USDA."
          - "Created a load balanced smtp cluster for the bulk sending of over 2 million email newsletters per month."
          - "Migrated content and applications over to Drupal based system involving several developers and designers."
      - company: "RPI Distance Education Department"
        position: "System Admin & Support Coordinator"
        date:
        start_date: "2003"
        end_date: "2007"
        location: "Troy, NY"
        summary: "Helped establish RPI as a leader in distance education. Administered linux and windows based servers. Worked with other departments for infrastructure set up and problems. Answered calls for support line. Helped design and create web pages, taught others to do the same. I had a nice office on campus as a undergrad!"
        highlights:
